      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#C6401F"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE8A3"/>
